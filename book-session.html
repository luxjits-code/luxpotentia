<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Lessons — Lux Potentia</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV OVERLAY -->
  <div class="nav-overlay" id="navOverlay">
    <button class="close-btn" onclick="toggleMenu()">Close</button>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="work-with-me.html">Work With Me</a>
    <a href="courses.html">Get the App</a>
  </div>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="index.html">Lux Potentia</a>
    <div class="nav-right">
      <button class="nav-menu-btn" onclick="toggleMenu()">Menu</button>
      <a class="nav-cta" href="work-with-me.html">Work With Me</a>
    </div>
  </nav>

  <div class="page-content">
    <section class="form-page">

      <div class="form-col">
        <h1 class="section-title fade-up fade-up-delay-1">PRIVATE LESSONS</h1>
        <div class="form-subtitle fade-up fade-up-delay-2">
          1x1 Private Lessons<br>
          Private Lesson 10 Pack
        </div>

        <!-- Replace action with your form endpoint (Formspree, Netlify Forms, etc.) -->
        <form class="contact-form" action="#" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label>First Name <span>(required)</span></label>
              <input type="text" name="first_name" required />
            </div>
            <div class="form-group">
              <label>Last Name <span>(required)</span></label>
              <input type="text" name="last_name" required />
            </div>
          </div>
          <div class="form-group">
            <label>Email <span>(required)</span></label>
            <input type="email" name="email" required />
          </div>
          <div class="form-check">
            <input type="checkbox" name="newsletter" id="newsletter-private" />
            <label for="newsletter-private">Sign up for news and updates</label>
          </div>
          <div class="form-group">
            <label>Subject <span>(required)</span></label>
            <input type="text" name="subject" required />
          </div>
          <div class="form-group">
            <label>Social Media Handles <span>(required)</span></label>
            <input type="text" name="social" placeholder="Please include links to your social media handles for screening purposes" required />
          </div>
          <div class="form-group">
            <label>Message <span>(required)</span></label>
            <textarea name="message" placeholder="Include experience level and training goals here, as well as anything else you'd like to tell me" required></textarea>
          </div>
          <div>
            <button type="submit" class="btn-outline btn-sm">Submit</button>
          </div>
        </form>
      </div>

      <div class="form-image-col">
        <!-- Replace with your actual image -->
        <img src="images/private-lessons.jpg" alt="Private Lessons with Lux Potentia" />
      </div>

    </section>

    <!-- FOOTER -->
    <footer>
      <a href="about.html">About</a>
      <a href="courses.html">Get the App</a>
      <a href="work-with-me.html">Work With Me</a>
    </footer>
  </div>

  <script src="js/nav.js"></script>
</body>
</html>
